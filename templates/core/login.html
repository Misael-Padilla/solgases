<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLGASES — Iniciar sesión</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* ---- Variables de color del sistema ---- */
        :root {
            --color-acento: #cc0000;
            --color-acento-hover: #aa0000;
        }

        body {
            background-color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Tarjeta del formulario de login */
        .login-card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* Nombre del sistema */
        .login-titulo {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .login-titulo span {
            color: var(--color-acento);
        }

        .login-subtitulo {
            font-size: 13px;
            color: #888888;
            margin-bottom: 28px;
        }

        /* Etiquetas de los campos */
        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: #333333;
        }

        /* Campos del formulario */
        .form-control {
            border-radius: 6px;
            border: 1px solid #dddddd;
            font-size: 14px;
            padding: 10px 12px;
        }

        .form-control:focus {
            border-color: var(--color-acento);
            box-shadow: 0 0 0 3px rgba(204, 0, 0, 0.15);
        }

        /* Botón de ingresar */
        .btn-ingresar {
            background-color: var(--color-acento);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-ingresar:hover {
            background-color: var(--color-acento-hover);
        }

        /* Enlace de recuperación de contraseña */
        .link-recuperar {
            font-size: 12px;
            color: var(--color-acento);
            text-decoration: none;
        }

        .link-recuperar:hover {
            text-decoration: underline;
        }

        /* Mensaje de error */
        .alerta-error {
            background-color: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--color-acento);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="login-card">

    <!-- Nombre del sistema -->
    <p class="login-titulo">SOL<span>GASES</span></p>
    <p class="login-subtitulo">Ingresa tus credenciales para continuar</p>

    <!-- Mensaje de error si las credenciales son incorrectas -->
    {% if form.errors %}
    <div class="alerta-error">
        <i class="bi bi-exclamation-circle"></i>
        Correo o contraseña incorrectos. Intenta de nuevo.
    </div>
    {% endif %}

    <!-- Formulario de login -->
    <form method="post" action="{% url 'core:login' %}">
        {% csrf_token %}

        <!-- Campo correo electrónico -->
        <div class="mb-3">
            <label class="form-label" for="correo">Correo electrónico</label>
            <input
                type="email"
                id="correo"
                name="username"
                class="form-control"
                placeholder="correo@ejemplo.com"
                required
                autofocus
            >
        </div>

        <!-- Campo contraseña -->
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label mb-0" for="password">Contraseña</label>
                <a href="{% url 'core:password_reset' %}" class="link-recuperar">¿Olvidaste tu contraseña?</a>
            </div>
            <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="••••••••"
                required
            >
        </div>

        <!-- Botón de ingreso -->
        <button type="submit" class="btn-ingresar">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>

    </form>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
